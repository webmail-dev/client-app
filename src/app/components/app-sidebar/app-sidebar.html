<div class="offcanvas sidebar-offcanvas offcanvas-start" tabindex="-1" id="offcanvasLeft">
  <div class="offcanvas-header">
    <img class="img-fluid profile-pic" src="assets/images/icons/profile.png" alt="perfil" />
    <h3>Hola, bienvenido</h3>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
  </div>
  <div class="offcanvas-body">
    <div class="sidebar-content">
      <ul class="link-section">
        <li>
          <div class="pages">
            <h3>Dirección de lectura</h3>
            <div class="switch-btn">
              <input id="dir-switch" name="directionSwitch" type="checkbox" aria-label="Cambiar dirección de lectura" />
            </div>
          </div>
        </li>
        <li>
          <div class="pages">
            <h3>Modo oscuro</h3>
            <div class="switch-btn">
              <input id="dark-switch" name="darkSwitch" type="checkbox" aria-label="Activar modo oscuro" />
            </div>
          </div>
        </li>
        <li>
          <a routerLink="/" class="pages">
            <h3>Inicio</h3>
            <i class="ri-arrow-drop-right-line"></i>
          </a>
        </li>
        <li>
          <a routerLink="/profile" class="pages">
            <h3>Mi cuenta</h3>
            <i class="ri-arrow-drop-right-line"></i>
          </a>
        </li>
        <li>
          <a routerLink="/" class="pages">
            <h3>Cerrar sesión</h3>
            <i class="ri-arrow-drop-right-line"></i>
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>
