<main class="auth-page">
  <section class="auth-card">
    <div class="auth-brand">
      <img src="assets/images/dalepueslogo.png" alt="Dale Pues" style="height:  170px; ; width: 170px;"/>
      <div>
        <p>Dale Pues</p>
        <h1>Iniciar sesión</h1>
      </div>
    </div>

    <p class="auth-copy">Entra para pedir comida, mercado, farmacia o coordinar tus envíos.</p>

    @if (errorMessage) {
      <div class="auth-alert" role="alert">{{ errorMessage }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form-panel">
      <label for="login-email">Correo electrónico</label>
      <input id="login-email" type="email" formControlName="email" autocomplete="email" placeholder="tu@email.com" />

      <label for="login-password">Contraseña</label>
      <input
        id="login-password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        placeholder="Tu contraseña"
      />

      <button class="theme-btn btn" type="submit" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <button class="google-btn" type="button" (click)="loginWithGoogle()" [disabled]="googleLoading">
      {{ googleLoading ? 'Conectando con Google...' : 'Continuar con Google' }}
    </button>

    <div class="auth-links">
      <button type="button" (click)="requestPasswordReset()">Recuperar contraseña</button>
      <a routerLink="/register">Crear cuenta</a>
    </div>
  </section>
</main>
