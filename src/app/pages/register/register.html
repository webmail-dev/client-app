<main class="auth-page">
  <section class="auth-card">
    <div class="auth-brand">
      <img src="assets/images/logo/favicon.png" alt="Dale Pues" />
      <div>
        <p>Dale Pues</p>
        <h1>Crear cuenta</h1>
      </div>
    </div>

    <p class="auth-copy">Crea tu cuenta para pedir, vender o repartir con Dale Pues.</p>

    @if (errorMessage) {
      <div class="auth-alert" role="alert">{{ errorMessage }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form-panel">
      <label for="register-name">Nombre</label>
      <input id="register-name" type="text" formControlName="name" autocomplete="name" />

      <label for="register-email">Correo electrónico</label>
      <input id="register-email" type="email" formControlName="email" autocomplete="email" />

      <label for="register-phone">Teléfono</label>
      <input id="register-phone" type="tel" formControlName="phone" autocomplete="tel" />

      <label for="register-type">Tipo de usuario</label>
      <select id="register-type" formControlName="type">
        @for (type of userTypes; track type.value) {
          <option [value]="type.value">{{ type.label }}</option>
        }
      </select>

      <label for="register-password">Contraseña</label>
      <input id="register-password" type="password" formControlName="password" autocomplete="new-password" />

      <label for="register-password-confirm">Confirmar contraseña</label>
      <input
        id="register-password-confirm"
        type="password"
        formControlName="passwordConfirm"
        autocomplete="new-password"
      />

      <label class="checkbox-row">
        <input type="checkbox" formControlName="termsAccepted" />
        <span>Acepto los términos y condiciones de Dale Pues.</span>
      </label>

      <button class="theme-btn btn" type="submit" [disabled]="loading">
        {{ loading ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/login">Ya tengo cuenta</a>
    </div>
  </section>
</main>
